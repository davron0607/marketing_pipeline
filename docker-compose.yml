version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: survey_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: survey_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "3501:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: survey_redis
    ports:
      - "3502:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: survey_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "3503:9000"
      - "3504:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: survey_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/raw-uploads &&
        mc mb --ignore-existing local/reports &&
        mc mb --ignore-existing local/survey-datasets &&
        echo 'Buckets created.'
      "
    restart: on-failure

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: survey_api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/survey_analytics
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: survey-datasets
      SECRET_KEY: super-secret-key-change-in-production
      DEBUG: "false"
    ports:
      - "3505:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: survey_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/survey_analytics
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: survey-datasets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./apps/worker:/app

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3505
    container_name: survey_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3505
    ports:
      - "3506:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
